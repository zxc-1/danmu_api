name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'   # 每天 03:00，可改

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add & fetch upstream
        run: |
          git remote add upstream https://github.com/huangxd-/danmu_api.git || true
          git fetch upstream

      - name: Fast-forward if possible
        run: |
          set -e
          git switch main
          if git merge --ff-only upstream/main; then
            git push origin main
            echo "FF synced."
            exit 0
          fi
          echo "Not fast-forward; will merge."
          git merge upstream/main || true

      # ⭐ 自动注入本地 README 区块
      - name: Inject local README content
        run: |
          # 读取本地文件
          LOCAL_CONTENT=$(cat README.local.md)
          # 替换标记区内容
          perl -0777 -i -pe "s|(<!-- LOCAL:START -->)(.*?)(<!-- LOCAL:END -->)|\$1\n${LOCAL_CONTENT}\n\$3|s" README.md
          # 如果有变化就提交
          if ! git diff --quiet README.md; then
            git add README.md
            git commit -m "chore: inject local README content"
            git push origin main
          else
            echo "README already up to date."
          fi