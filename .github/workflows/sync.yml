name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"   # 每天 UTC 19:00（北京+8为次日03:00）

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean working tree
        run: |
          echo "======================"
          echo "🧹  CLEAN WORKING TREE"
          echo "======================"
          git merge --abort || true
          git reset --hard
          git clean -fd

      - name: Stage upstream changes
        run: |
          echo "======================"
          echo "⬇️  FETCH UPSTREAM"
          echo "======================"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote remove upstream || true
          git remote add upstream https://github.com/huangxd-/danmu_api.git
          git fetch upstream --prune

          git checkout main
          git pull --ff-only origin main

          echo "======================"
          echo "📊  CALCULATE DIFF"
          echo "======================"
          git rev-list --left-right --count main...upstream/main || true

          git diff --binary main...upstream/main > /tmp/up.patch || true
          if [ -s /tmp/up.patch ]; then
            echo "🔄  Applying upstream changes..."
            git apply --index /tmp/up.patch
          else
            echo "✅  No upstream changes detected."
          fi

      - name: Exit if no changes
        run: |
          if git diff --cached --quiet && git diff --quiet; then
            echo "======================"
            echo "✅  FINISHED - NO CHANGES TO SYNC"
            echo "======================"
            exit 0
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          commit-message: "chore: sync upstream"
          title: "Sync upstream"
          body: |
            🔔 Auto PR pulling updates from upstream/main.
          delete-branch: false