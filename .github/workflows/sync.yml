name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"   # 每天 UTC 19:00（北京时间次日 03:00）

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/huangxd-/danmu_api.git || true
          git fetch upstream --prune

          # 保证当前在 main 分支并拉取最新
          git checkout main
          git pull --ff-only origin main

          # 直接把 upstream/main 的更新做成改动
          git checkout -B sync-upstream
          git diff --binary main...upstream/main > /tmp/up.patch || true
          if [ -s /tmp/up.patch ]; then
            git apply --index /tmp/up.patch || true
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: sync-upstream      # PR 源分支
          base: main                 # PR 目标分支
          commit-message: "chore: sync upstream"
          title: "Sync upstream"
          body: |
            Automated PR to pull latest updates from upstream.
          delete-branch: false