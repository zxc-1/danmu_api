name: Sync with upstream

on:
  schedule:
    - cron: "0 2 * * *"   # 每天凌晨 2 点自动同步，你可以改时间
  workflow_dispatch:     # 可以手动触发

jobs:
  sync:
    # 👇 关键：只在你自己的仓库运行
    if: github.repository == 'zxc-1/danmu_api'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/huangxd-/danmu_api.git || true
          git fetch upstream

      - name: Merge upstream/main into local main, favoring our changes on conflict
        run: |
          git checkout main
          git merge upstream/main -X ours --no-edit

      - name: Push merged code back to origin
        run: |
          git push origin main